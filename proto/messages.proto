syntax = "proto3";

package types;

option go_package = "bats/internal/types";

enum MessageType {
    PREPREPARE  = 0;
    PREPARE     = 1;
    COMMIT      = 2;
    VIEW_CHANGE = 3;
    NEW_VIEW    = 4;
    JOIN_REQUEST = 5;
    JOIN_RESPONSE = 6;
}

message ConsensusMessage {
    MessageType type = 1;
    uint64 view = 2;
    uint64 sequence = 3;
    bytes digest = 4;
    string node_id = 5;
    bytes signature = 6;
    
    // Extensions for View Change
    repeated ConsensusMessage pre_prepares = 7;
}

message NodeStatus {
    string id = 1;
    string port = 2;
    bool alive = 3;
    uint64 view = 4;
    bool is_leader = 5;
}

message Header {
    uint32 version = 1;
    uint64 sequence = 2;
    bytes sender_id = 3;
    bytes intent_hash = 4;
}

message Envelope {
    Header header = 1;
    bytes payload = 2;
    bytes signature = 3;
}

message MembershipJoinRequest {
    string id = 1;
    string port = 2;
    bytes public_key = 3;
}

message MembershipJoinResponse {
    bool approved = 1;
    repeated NodeStatus nodes = 2;
    uint64 current_view = 3;
    uint32 f = 4;
}

message ClusterUpdate {
    NodeStatus new_node = 1;
}
